name: microclaw

services:
  git-mcp:
    image: node:lts-slim
    restart: unless-stopped
    working_dir: /repos
    volumes:
      - /home/jess/home/github-mcp/repos:/repos
    environment:
      MCP_TRANSPORT_TYPE: http
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "3015"
      GIT_BASE_DIR: /repos
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PAT}
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: "credential.https://github.com.helper"
      GIT_CONFIG_VALUE_0: "!f() { echo username=token; echo password=$$GITHUB_PERSONAL_ACCESS_TOKEN; }; f"
    command: ["npx", "-y", "@cyanheads/git-mcp-server@latest"]

  microclaw-thinker:
    image: microclaw-local:latest
    build:
      context: ..
      dockerfile: microclaw-config/Dockerfile
    restart: unless-stopped
    volumes:
      - ./microclaw-thinker.config.yaml:/app/microclaw.config.yaml:ro
      - ./thinker-data:/home/microclaw/.microclaw-thinker
    extra_hosts:
      - "host.docker.internal:host-gateway"

  lmstudio-proxy:
    build: lmstudio-proxy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  microclaw:
    image: microclaw-local:latest
    build:
      context: ..
      dockerfile: microclaw-config/Dockerfile
    restart: unless-stopped
    ports:
      - "10961:10961"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./microclaw.config.yaml:/app/microclaw.config.yaml:ro
      # DinD path symmetry: the source MUST be the same absolute path as the
      # target so that when microclaw asks the host docker daemon to bind-mount
      # a working_dir into a sibling sandbox container, the daemon resolves the
      # path on the host (not the microclaw container) and finds real files.
      # The host should expose /home/microclaw/.microclaw as a symlink to the
      # real data dir (e.g. ln -s /home/jess/home/microclaw-config/data
      # /home/microclaw/.microclaw); docker resolves the symlink at mount time.
      - /home/microclaw/.microclaw:/home/microclaw/.microclaw
      - ./tmp:/app/tmp
    group_add:
      - "${DOCKER_GID:-973}"
    extra_hosts:
      # reach the host-network HAProxy (lmstudio-proxy) that fronts jessmac's LMStudio
      - "host.docker.internal:host-gateway"
